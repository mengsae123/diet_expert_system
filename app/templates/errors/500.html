<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Server Error</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #eef2ff;
      padding: 1.25rem;
    }
    .card {
      width: min(520px, 100%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    .badge {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.32rem 0.72rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fecaca;
      background: rgba(127, 29, 29, 0.4);
      border: 1px solid rgba(248, 113, 113, 0.4);
    }
    h1 {
      font-size: clamp(1.65rem, 4vw, 2.2rem);
      margin-bottom: 0.8rem;
    }
    p {
      color: #d6dcf0;
      line-height: 1.55;
    }
    .actions {
      margin-top: 1.4rem;
      display: flex;
      justify-content: center;
      gap: 0.65rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 130px;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      text-decoration: none;
      font-weight: 600;
    }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: rgba(96, 165, 250, 0.45);
    }
  </style>
</head>
<body>
  <section class="card" role="alert" aria-live="polite">
    <span class="badge">INTERNAL SERVER ERROR</span>
    <h1>Something went wrong</h1>
    <p>
      We hit an unexpected server error while processing your request.
      Please try again in a moment.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="javascript:window.location.reload();">Try Again</a>
      <a class="btn" href="/">Go Home</a>
    </div>
  </section>
</body>
</html>
