<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connection Lost</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background dots */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: drift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-40px); }
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 56px 48px;
      text-align: center;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* WiFi icon built with CSS */
    .wifi-icon {
      position: relative;
      width: 80px;
      height: 60px;
      margin: 0 auto 32px;
    }

    .wifi-arc {
      position: absolute;
      border: 5px solid transparent;
      border-top-color: rgba(255,255,255,0.2);
      border-radius: 50%;
      left: 50%;
      transform: translateX(-50%) rotate(-45deg);
      animation: pulse-arc 2s ease-in-out infinite;
    }

    .wifi-arc:nth-child(1) { width: 80px; height: 80px; top: 0;  animation-delay: 0s; }
    .wifi-arc:nth-child(2) { width: 56px; height: 56px; top: 12px; animation-delay: 0.2s; }
    .wifi-arc:nth-child(3) { width: 32px; height: 32px; top: 24px; animation-delay: 0.4s; }

    .wifi-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    /* X slash over wifi */
    .wifi-slash {
      position: absolute;
      top: -4px; left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 70px;
    }

    .wifi-slash::before,
    .wifi-slash::after {
      content: '';
      position: absolute;
      width: 72px;
      height: 5px;
      background: #ef4444;
      border-radius: 3px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
    }

    .wifi-slash::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    h1 {
      color: #ffffff;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #ffffff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(59, 130, 246, 0.5);
      color: #ffffff;
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    /* Spinning arrow icon */
    .arrow-icon {
      display: inline-block;
      font-size: 1rem;
      transition: transform 0.4s ease;
    }

    .btn-retry:hover .arrow-icon {
      transform: rotate(180deg);
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 32px 0;
    }

    .hint {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- WiFi broken icon -->
    <div class="wifi-icon">
      <div class="wifi-arc"></div>
      <div class="wifi-arc"></div>
      <div class="wifi-arc"></div>
      <div class="wifi-dot"></div>
      <div class="wifi-slash"></div>
    </div>

    <!-- Status badge -->
    <div class="status-badge">
      <div class="status-dot"></div>
      Database Unreachable
    </div>

    <h1>No Connection</h1>
    <p class="subtitle">
      We couldn't connect to the database.<br>
      Please check your internet connection and try again.
    </p>

    <a href="{{ request.url }}" class="btn-retry">
      <span class="arrow-icon">&#8635;</span>
      Try Again
    </a>

    <div class="divider"></div>
    <p class="hint">If the problem persists, the server may be temporarily down.</p>

  </div>
</body>
</html>
